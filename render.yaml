services:
  - type: web
    name: sitesnap-web-solutions
    runtime: node
    plan: free
    buildCommand: "npm install --omit=dev"
    startCommand: "node server/index.js"
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: sitesnap
